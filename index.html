<style>
:root{
  --cream:#f4edda; --paper:#fbf6e9;
  --teal:#1d5c52; --teal-dk:#123f38; --night:#0d2b26;
  --terra:#c05a2e; --mustard:#d9a441; --rose:#c98d83;
  --ink:#2f2a22; --sub:#7d7361; --line:#e2d7bd;
  --sans:'Noto Sans TC',sans-serif; --serif:'Noto Serif TC',serif; --disp:'Fraunces',serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{overflow-x:hidden;max-width:100%}
body{font-family:var(--sans);color:var(--ink);background:var(--teal-dk);display:flex;justify-content:center}
h1,h2,h3{font-family:var(--serif)}
button{font-family:inherit;border:none;background:none;cursor:pointer}
input,select{font-family:inherit}
.app{width:100%;max-width:430px;min-height:100vh;background:var(--cream);position:relative;overflow-x:hidden}
/* @CSS:TABS */
.quest{display:flex;align-items:center;gap:10px;padding:10px;border:2px solid var(--ink);border-radius:12px;margin-bottom:10px;background:var(--paper);box-shadow:3px 3px 0 rgba(47,42,34,.12);cursor:pointer}
.quest.done{background:#e5eee4;opacity:.85}
.quest .box{width:26px;height:26px;flex:none;border:2px solid var(--ink);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;background:var(--paper)}
.quest.done .box{background:var(--teal);color:var(--cream)}
.quest .q{flex:1;font-size:13px;line-height:1.4}
.quest .q small{display:block;color:var(--sub);font-size:11px;margin-top:2px}
.tag{font-size:10px;background:var(--mustard);border:1.5px solid var(--ink);border-radius:8px;padding:1px 8px;font-weight:700;margin-left:6px;vertical-align:middle}
.milestone{border:2px solid var(--ink);border-radius:14px;padding:14px;text-align:center;background:linear-gradient(160deg,var(--paper) 60%,var(--cream));box-shadow:4px 4px 0 var(--mustard)}
.milestone .big{font-size:30px}
.milestone b{display:block;font-size:14px;margin-top:4px}
.milestone small{color:var(--sub);font-size:11px}
.milestone .share{margin-top:8px;font-size:11px;color:var(--terra);font-weight:700;cursor:pointer}
.cat-row{display:flex;align-items:center;gap:12px}
.avatar{width:50px;height:50px;border-radius:50%;background:var(--mustard);border:2px solid var(--ink);display:flex;align-items:center;justify-content:center;font-size:24px;flex:none}
.cat-meta{flex:1}
.cat-meta .name{font-weight:800;font-size:15px}
.cat-meta .breed{font-size:11px;color:var(--sub)}
.score .num{font-size:26px;font-weight:900;color:var(--terra);font-family:var(--disp)}
.score .lbl{font-size:10px;color:var(--sub);text-align:right}
.meter{height:10px;background:var(--cream);border:1.5px solid var(--ink);border-radius:5px;margin-top:10px;overflow:hidden}
.meter>div{height:100%;background:repeating-linear-gradient(45deg,var(--terra),var(--terra) 6px,var(--mustard) 6px,var(--mustard) 12px)}
.minibars{display:flex;gap:4px;align-items:flex-end;height:40px;margin-top:12px}
.minibars .bar{flex:1;background:var(--line);border-radius:3px 3px 0 0;min-height:3px}
.minibars .bar.pos{background:var(--mustard)}
.minibars .bar.neg{background:var(--rose)}
.insight{display:flex;gap:10px;padding:9px 0;border-bottom:1px dashed var(--line);font-size:13px;line-height:1.55}
.insight:last-child{border-bottom:none}
.empty-state{text-align:center;padding:40px 20px;color:var(--sub)}
.empty-state .big{font-size:40px;margin-bottom:12px}
.field{margin-bottom:14px}
.field label{font-size:12px;color:var(--sub);display:block;margin-bottom:4px;font-weight:700}
.field input,.field select{width:100%;padding:10px;border:2px solid var(--ink);border-radius:8px;background:var(--paper);font-size:14px}
.field input:focus,.field select:focus{outline:none;border-color:var(--terra)}
.tilehead{position:relative;padding:18px 18px 14px;color:var(--cream);background:var(--teal);overflow:hidden}
.tilehead::before{content:"";position:absolute;inset:0;opacity:.16;
  background-image:
    radial-gradient(circle at 0 0, var(--mustard) 0 18px, transparent 19px),
    radial-gradient(circle at 56px 0, var(--mustard) 0 18px, transparent 19px),
    radial-gradient(circle at 0 56px, var(--mustard) 0 18px, transparent 19px),
    radial-gradient(circle at 56px 56px, var(--mustard) 0 18px, transparent 19px),
    radial-gradient(circle at 28px 28px, var(--terra) 0 12px, transparent 13px);
  background-size:56px 56px}
.tilehead h1{font-size:20px;position:relative;letter-spacing:1px;display:flex;align-items:center;gap:8px}
.tilehead .streak{position:absolute;right:16px;top:16px;background:var(--terra);border:2px solid var(--cream);border-radius:14px;padding:5px 10px;text-align:center;box-shadow:2px 2px 0 rgba(0,0,0,.2)}
.tilehead .streak b{display:block;font-size:16px;line-height:1.1}
.tilehead .streak span{font-size:8px;letter-spacing:1px}
.tabs{display:flex;background:var(--teal-dk);position:sticky;top:0;z-index:5}
.tab{flex:1;text-align:center;padding:10px 2px;font-size:12px;color:#9fbcb2;cursor:pointer;border-bottom:3px solid transparent;transition:color .15s}
.tab.active{color:var(--cream);border-bottom-color:var(--mustard);font-weight:700;background:rgba(255,255,255,.05)}
.page{display:none;padding:16px;padding-bottom:32px}
.page.active{display:block}
.card{background:var(--paper);border:2px solid var(--ink);border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:4px 4px 0 rgba(47,42,34,.15)}
.card h3{font-size:14px;margin:0 0 10px;color:var(--teal-dk);letter-spacing:.5px}
.card h3 .deco{color:var(--terra)}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{border:2px solid var(--ink);background:var(--paper);border-radius:18px;padding:7px 11px;font-size:13px;cursor:pointer;user-select:none;box-shadow:2px 2px 0 rgba(47,42,34,.15)}
.chip.sel{background:var(--mustard);font-weight:700}
.chip.neg.sel{background:var(--rose)}
.chip.act.sel{background:#8fb3a5}
.switcher{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.switcher .chip{flex:1;text-align:center;min-width:90px}
.switcher .chip.sel{background:var(--teal);color:var(--cream)}
.btn{width:100%;background:var(--terra);color:var(--cream);border:2px solid var(--ink);border-radius:12px;padding:12px;font-size:15px;font-weight:700;margin-top:14px;cursor:pointer;box-shadow:3px 3px 0 rgba(47,42,34,.3);letter-spacing:1px}
.btn.ghost{background:var(--paper);color:var(--ink)}
.note{font-size:11px;color:var(--sub);background:var(--cream);border:1px dashed var(--terra);border-radius:10px;padding:9px;margin-top:10px;line-height:1.6}
.toast{position:fixed;left:50%;bottom:24px;transform:translate(-50%,120%);background:var(--ink);color:var(--cream);padding:10px 18px;border-radius:20px;font-size:13px;z-index:50;transition:transform .25s ease;box-shadow:0 6px 20px rgba(0,0,0,.3);max-width:80vw;text-align:center}
.toast.show{transform:translate(-50%,0)}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
}
</style>
</head>

const DAY_MS = 86400000;
const DECAY = 0.85;

Catnu.entryPolarity = function entryPolarity(entry) {
  let pos = 0, neg = 0;
  for (const rid of (entry.reactions || [])) {
    const p = Catnu.REACTION_POLARITY[rid];
    if (p === 1) pos++; else if (p === -1) neg++;
  }
  if (pos > neg) return 'positive';
  if (neg > pos) return 'negative';
  return 'neutral';
};

function weightedWindowScore(logs, catId, nowTs, windowStartDaysAgo, windowEndDaysAgo) {
  let num = 0, den = 0, nonNeutralCount = 0;
  for (const entry of logs) {
    if (entry.catId !== catId) continue;
    const daysAgo = Math.floor((nowTs - entry.ts) / DAY_MS);
    if (daysAgo < windowStartDaysAgo || daysAgo > windowEndDaysAgo) continue;
    const polarity = Catnu.entryPolarity(entry);
    if (polarity === 'neutral') continue;
    nonNeutralCount++;
    const w = Math.pow(DECAY, daysAgo);
    den += w;
    if (polarity === 'positive') num += w;
  }
  if (nonNeutralCount < 5) return { score: null, insufficient: true };
  return { score: Math.round((100 * num) / den), insufficient: false };
}

Catnu.affectionScore = function affectionScore(logs, catId, nowTs) {
  const current = weightedWindowScore(logs, catId, nowTs, 0, 6);
  const previous = weightedWindowScore(logs, catId, nowTs, 7, 13);
  const weekChange = (!current.insufficient && !previous.insufficient)
    ? current.score - previous.score
    : null;
  return { score: current.score, insufficient: current.insufficient, weekChange };
};

Catnu.actionCorrelation = function actionCorrelation(logs, catId, actionId, nowTs) {
  const catLogs = logs.filter(e => e.catId === catId);
  const actionEntries = catLogs.filter(e => (e.actions || []).includes(actionId));
  const n = actionEntries.length;

  const THIRTY_MIN = 30 * 60000;
  const sample = [];
  for (const a of actionEntries) {
    if (!sample.includes(a)) sample.push(a);
    for (const e of catLogs) {
      if (e !== a && e.ts > a.ts && e.ts - a.ts <= THIRTY_MIN && !sample.includes(e)) {
        sample.push(e);
      }
    }
  }
  let samplePos = 0, sampleNeg = 0;
  for (const e of sample) {
    const p = Catnu.entryPolarity(e);
    if (p === 'positive') samplePos++; else if (p === 'negative') sampleNeg++;
  }
  const sampleNonNeutral = samplePos + sampleNeg;
  const P_a = sampleNonNeutral > 0 ? samplePos / sampleNonNeutral : null;

  let basePos = 0, baseNeg = 0;
  for (const e of catLogs) {
    const p = Catnu.entryPolarity(e);
    if (p === 'positive') basePos++; else if (p === 'negative') baseNeg++;
  }
  const baseNonNeutral = basePos + baseNeg;
  const P_base = baseNonNeutral > 0 ? basePos / baseNonNeutral : null;

  const NEG_IDS = ['flatears', 'walkaway', 'hiss', 'bite'];
  const negativeCount = actionEntries.filter(e =>
    (e.reactions || []).some(r => NEG_IDS.includes(r))
  ).length;
  const negativeRate = n > 0 ? negativeCount / n : 0;

  const insufficientData = n >= 1 && n < 5;
  const positiveFinding = n >= 5 && P_a !== null && P_base !== null && (P_a - P_base) >= 0.15;
  const negativeWarning = n >= 5 && negativeRate >= 0.6;

  return { n, P_a, P_base, negativeCount, negativeRate, insufficientData, positiveFinding, negativeWarning };
};

Catnu.generateInsights = function generateInsights(logs, cat, nowTs) {
  const breed = Catnu.BREEDS.find(b => b.id === cat.breedId);
  const positives = [], negatives = [], notes = [];

  for (const action of Catnu.ACTIONS) {
    const r = Catnu.actionCorrelation(logs, cat.id, action.id, nowTs);
    if (r.positiveFinding) {
      let text = `**${action.label}後 30 分鐘**正面反應率 ${formatPct(r.P_a)}%（平時 ${formatPct(r.P_base)}%）——${POSITIVE_TIPS[action.id] || '呢個係你哋之間嘅黃金公式，不妨保持！'}`;
      const rule = breed && breed.breedRules.find(x => x.when === 'positiveFinding' && x.action === action.id);
      if (rule) text += ` ${rule.text}`;
      positives.push({ type: 'positive', actionId: action.id, text });
    } else if (r.negativeWarning) {
      let text = `**${action.label}** ${r.n} 次有 ${r.negativeCount} 次負面反應——${NEGATIVE_TIPS[action.id] || '留意佢嘅即時反應，減少呢個動作嘅頻率。'}`;
      const rule = breed && breed.breedRules.find(x => x.when === 'negativeWarning' && x.action === action.id);
      if (rule) text += ` ${rule.text}`;
      negatives.push({ type: 'negative', actionId: action.id, text });
    } else if (r.insufficientData) {
      notes.push({ type: 'insufficient', actionId: action.id, text: `${action.label} 記錄得 ${r.n} 次，未夠數據——今晚試多次？` });
    }
  }

  if (breed) {
    for (const rule of breed.breedRules) {
      if (rule.when !== 'noRecentAction') continue;
      const last = logs
        .filter(e => e.catId === cat.id && (e.actions || []).includes(rule.action))
        .reduce((max, e) => Math.max(max, e.ts), -Infinity);
      const daysSince = last === -Infinity ? Infinity : (nowTs - last) / DAY_MS;
      if (daysSince >= rule.days) notes.push({ type: 'insufficient', actionId: rule.action, text: rule.text });
    }
  }

  return [...positives, ...negatives, ...notes].slice(0, 5);
};

function dateStrToDays(s) {
  const [y, m, d] = s.split('-').map(Number);
  return Math.floor(Date.UTC(y, m - 1, d) / DAY_MS);
}

Catnu.checkStreakBreak = function checkStreakBreak(streak, todayStr) {
  if (!streak.lastDoneDate) return { ...streak };
  const diff = dateStrToDays(todayStr) - dateStrToDays(streak.lastDoneDate);
  if (diff >= 2) return { ...streak, current: 0 };
  return { ...streak };
};

Catnu.completeQuestsForDay = function completeQuestsForDay(streak, todayStr) {
  if (streak.lastDoneDate === todayStr) return { ...streak };
  const current = streak.current + 1;
  return { current, best: Math.max(streak.best, current), lastDoneDate: todayStr };
};

Catnu.checkNewMilestones = function checkNewMilestones(state, nowTs) {
  const unlocked = new Set(state.milestones.map(m => `${m.id}:${m.catId || ''}`));
  const found = [];

  for (const cat of state.cats) {
    for (const def of Catnu.MILESTONE_DEFS) {
      const key = `${def.id}:${cat.id}`;
      if (unlocked.has(key)) continue;
      if (def.check(state.logs, cat.id)) found.push({ id: def.id, catId: cat.id, unlockedAt: nowTs });
    }
    const score = Catnu.affectionScore(state.logs, cat.id, nowTs);
    if (!score.insufficient) {
      if (score.score >= 70 && !unlocked.has(`score-70:${cat.id}`)) found.push({ id: 'score-70', catId: cat.id, unlockedAt: nowTs });
      if (score.score >= 85 && !unlocked.has(`score-85:${cat.id}`)) found.push({ id: 'score-85', catId: cat.id, unlockedAt: nowTs });
    }
  }

  if (state.streak.best >= 7 && !unlocked.has('streak-7:')) found.push({ id: 'streak-7', catId: null, unlockedAt: nowTs });
  if (state.streak.best >= 30 && !unlocked.has('streak-30:')) found.push({ id: 'streak-30', catId: null, unlockedAt: nowTs });

  return found;
};

function seedFromDate(dateStr) {
  let h = 0;
  for (let i = 0; i < dateStr.length; i++) h = (h * 31 + dateStr.charCodeAt(i)) >>> 0;
  // avalanche mix (murmur3-style finalizer) — without this, adjacent YYYY-MM-DD strings
  // (which differ only in the last digit on 9 of 10 days) produce seeds that differ by ~1,
  // so pool picks would visibly "walk" by one slot per day instead of varying day to day.
  h ^= h >>> 16; h = Math.imul(h, 0x45d9f3b) >>> 0; h ^= h >>> 13;
  return h >>> 0; // ^= yields a signed Int32 result — re-normalize to unsigned before returning
}
function pick(arr, seed) { return arr[seed % arr.length]; }

function buildQuestForCategory(category, cat, logs, dateStr, seed, nowTs) {
  if (category === 'universal') {
    const text = pick(Catnu.UNIVERSAL_QUEST_POOL, seed);
    return { id: `${dateStr}-${cat.id}-u${seed}`, text, catId: cat.id, source: 'universal', done: false };
  }
  if (category === 'data') {
    let best = null, bestN = Infinity, fallback = null;
    for (const action of Catnu.ACTIONS) {
      const r = Catnu.actionCorrelation(logs, cat.id, action.id, nowTs);
      if (r.P_a !== null && (best === null || r.P_a > best.P_a)) best = { action, P_a: r.P_a };
      if (r.n < bestN) { bestN = r.n; fallback = action; }
    }
    if (best) return { id: `${dateStr}-${cat.id}-d`, text: `今日做多次 ${best.action.label}`, catId: cat.id, source: 'data', done: false };
    return { id: `${dateStr}-${cat.id}-d`, text: `試下 ${fallback.label}，收集數據`, catId: cat.id, source: 'data', done: false };
  }
  const breed = Catnu.BREEDS.find(b => b.id === cat.breedId);
  const rule = breed && breed.breedRules.find(r => r.when === 'noRecentAction');
  if (rule) return { id: `${dateStr}-${cat.id}-b`, text: rule.text, catId: cat.id, source: 'breed', done: false };
  if (breed && breed.mixedBreed) {
    const text = pick(breed.approachGuide, seed);
    return { id: `${dateStr}-${cat.id}-b`, text, catId: cat.id, source: 'breed', done: false };
  }
  const text = pick(Catnu.UNIVERSAL_QUEST_POOL, seed + 3);
  return { id: `${dateStr}-${cat.id}-b`, text, catId: cat.id, source: 'universal', done: false };
}

Catnu.generateDailyQuests = function generateDailyQuests(dateStr, cats, logs, nowTs) {
  const seed = seedFromDate(dateStr);
  const CATEGORIES = ['universal', 'data', 'breed'];
  const quests = [];
  for (let slot = 0; slot < 3; slot++) {
    const cat = cats[(seed + slot) % cats.length];
    // slot*7 is coprime with CATEGORIES.length (3), guaranteeing each category appears
    // exactly once per day. The 'data'/'breed' branches below rely on that — their quest
    // ids have no per-slot suffix, so they'd collide if this guarantee ever broke (e.g.
    // CATEGORIES growing to a length sharing a factor with 7, or slot*7 being changed).
    const category = CATEGORIES[(seed + slot * 7) % CATEGORIES.length];
    quests.push(buildQuestForCategory(category, cat, logs, dateStr, seed + slot, nowTs));
  }
  return quests;
};

function groomingNeedFor(breedId) {
  return Catnu.GROOMING_NEED[breedId] != null ? Catnu.GROOMING_NEED[breedId] : 35;
}

const QUIZ_REASON_DIMS = [
  { key: 'clingy', high: n => `${n}黐人度高，啱你想要成日跟前跟後嘅陪伴感。`, low: n => `${n}性格獨立，唔會日日纏住你，啱你想要嘅自由度。` },
  { key: 'active', high: n => `${n}活躍愛玩，配合到你想俾佢郁嘅生活模式。`, low: n => `${n}性格恬靜，啱你想要嘅慢活相處節奏。` },
  { key: 'holdOk', high: n => `${n}接受被抱程度高，啱你想要多啲身體接觸。`, low: n => `${n}唔太受抱，啱你想俾佢多啲自主空間。` },
  { key: 'vocal', high: n => `${n}比較愛叫，會主動同你「講嘢」。`, low: n => `${n}比較文靜少叫，啱你想要安靜嘅相處。` },
];

function quizReason(breed, desired) {
  if (breed.mixedBreed || !breed.traits) return `${breed.name}性格靠實際相處摸底，唔受品種刻板定型限制，最夾隨心養育嘅心態。`;
  // pick THIS breed's own closest-matching dimension (not a shared `desired` threshold check)
  // so two similarly-scoring breeds in the same top-3 don't read as copy-pasted text.
  let best = null;
  for (const d of QUIZ_REASON_DIMS) {
    const gap = Math.abs(breed.traits[d.key] - desired[d.key]);
    if (best === null || gap < best.gap) best = { dim: d, gap, val: breed.traits[d.key] };
  }
  return best.val >= 55 ? best.dim.high(breed.name) : best.dim.low(breed.name);
}

Catnu.scoreAllBreeds = function scoreAllBreeds(answers, opts) {
  opts = opts || {};
  const desired = { clingy: 50, active: 50, holdOk: 50, vocal: 50 };
  let groomTolerance = 55, beginner = false, budgetLow = false;

  Catnu.QUIZ_QUESTIONS.forEach((q, i) => {
    const opt = q.options[answers[i]];
    if (!opt) return;
    for (const key of Object.keys(opt.delta || {})) {
      desired[key] = Math.max(0, Math.min(100, desired[key] + opt.delta[key]));
    }
    if (opt.groomTolerance != null) groomTolerance = opt.groomTolerance;
    if (opt.beginner) beginner = true;
    if (opt.budgetLow) budgetLow = true;
  });

  const scored = Catnu.BREEDS.map(breed => {
    if (breed.mixedBreed) {
      return { breed, score: 60 + (budgetLow ? 15 : 0), reason: '性格靠實際相處摸底，唔受品種刻板定型限制，加上養育成本通常較低。' };
    }
    const dims = ['clingy', 'active', 'holdOk', 'vocal'];
    let diff = 0;
    for (const d of dims) diff += Math.abs(breed.traits[d] - desired[d]);
    let score = 100 - diff / dims.length;

    score -= Math.abs(groomingNeedFor(breed.id) - groomTolerance) * 0.15;
    if (beginner && breed.traits.active > 70) score -= 10;
    if (beginner && groomingNeedFor(breed.id) > 70) score -= 8;

    if (opts.mode === 'addCat') {
      score += ((breed.multiCatFriendly - 50) / 50) * 15;
      if ((opts.existingCatNegativeRate || 0) > 0.4) {
        score += ((50 - breed.traits.active) / 50) * 10 + ((50 - breed.traits.clingy) / 50) * 5;
      }
    }

    score = Math.max(0, Math.min(100, score));
    return { breed, score, reason: quizReason(breed, desired) };
  });

  scored.sort((a, b) => b.score - a.score);
  return scored;
};

Catnu.matchQuiz = function matchQuiz(answers, opts) {
  return Catnu.scoreAllBreeds(answers, opts).slice(0, 3);
};
/* @APP:STORE */
const STORAGE_KEY = 'catnu.v1';

function defaultState() {
  return {
    schemaVersion: 1,
    cats: [],
    logs: [],
    quests: {},
    streak: { current: 0, best: 0, lastDoneDate: '' },
    milestones: [],
    customActions: [],
    settings: { createdAt: Date.now() },
  };
}

Catnu.Store = {
  load() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    try {
      const parsed = JSON.parse(raw);
      // TODO: when schemaVersion 2 ships, this needs to become a version-dispatch
      // (migrate forward) instead of discarding data on any mismatch.
      if (parsed.schemaVersion !== 1) return defaultState();
      return parsed;
    } catch (e) {
      console.warn('Catnu.Store.load: corrupt localStorage data, resetting to default', e);
      return defaultState();
    }
  },
  save(state) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  },
};

let recordCatId = null;
let recordSelReactions = new Set();
let recordSelActions = new Set();
let recordNoteOpen = false;
let recordNoteValue = '';
let recordBackfill = false;
let recordBackfillTime = '';
let recordAddActionOpen = false;
let recordNewActionEmoji = '';
let recordNewActionLabel = '';

function actionsForRecord(state) {
  return Catnu.ACTIONS.concat(state.customActions.map(c => ({ id: c.id, label: `${c.emoji} ${c.label}` })));
}

function resetRecordFormState() {
  recordSelReactions = new Set();
  recordSelActions = new Set();
  recordNoteOpen = false;
  recordNoteValue = '';
  recordBackfill = false;
  recordBackfillTime = '';
  recordAddActionOpen = false;
  recordNewActionEmoji = '';
  recordNewActionLabel = '';
}

function renderRecord(state) {
  const el = document.getElementById('tab-record');
  if (!state.cats.length) {
    el.innerHTML = '<div class="card" style="text-align:center;padding:30px 16px"><div style="font-size:36px;margin-bottom:10px">🐾</div><b>未有貓貓資料</b><p style="margin-top:8px;font-size:13px;color:var(--sub)">去「檔案」page 加返隻貓先可以記錄。</p></div>';
    return;
  }

  const actions = actionsForRecord(state);
  el.innerHTML = `
    <div class="switcher">
      ${state.cats.map(c => `<div class="chip ${c.id === recordCatId ? 'sel' : ''}" data-cat="${c.id}">${c.emoji} ${c.name}</div>`).join('')}

  }));

  });

  document.getElementById('record-new-action-save').addEventListener('click', () => {

  document.getElementById('record-submit').addEventListener('click', () => {

    state.logs.push({
      id: 'log-' + Date.now() + '-' + Math.random().toString(36).slice(2, 7),

    if (unlocked.length) {

    resetRecordFormState();
    renderRecord(state);
  });
}

function renderQuests(state) {

  const quests = state.quests[today].catQuests;
  const doneCount = quests.filter(q => q.done).length;
  const catName = id => (state.cats.find(c => c.id === id) || {}).name || '';
  const latestMilestone = state.milestones.slice().sort((a, b) => b.unlockedAt - a.unlockedAt)[0];

  el.innerHTML = `
    <div class="card">
      <h3><span class="deco">◆</span> 今日溝貓任務<span class="tag">${doneCount}/3</span></h3>
      <div style="font-size:12px;color:var(--sub);margin:-4px 0 10px">🔥 連續 ${state.streak.current} 日 · 🏆 最佳 ${state.streak.best} 日</div>
      ${quests.map(q => `
        <div class="quest ${q.done ? 'done' : ''}" data-qid="${q.id}">
          <div class="box">${q.done ? '✓' : ''}</div>
          <div class="q">${catName(q.catId)}：${q.text}<small>${sourceLabel(q.source)}</small></div>
        </div>
      `).join('')}
      <div class="note">任務由分析引擎＋品種特性生成，日日唔同。完成晒先保得住 🔥 Streak（過咗夜 11:59 未完成會斷）。</div>
    </div>
    ${latestMilestone ? `
      <div class="card">
        <h3><span class="deco">◆</span> 最新里程碑</h3>
        <div class="milestone">
          <div class="big">${(Catnu.MILESTONE_META[latestMilestone.id] || {}).emoji || '🏅'}</div>
          <b>${catName(latestMilestone.catId) ? catName(latestMilestone.catId) + ' ' : ''}${(Catnu.MILESTONE_META[latestMilestone.id] || {}).label || latestMilestone.id}</b>
          <small>${new Date(latestMilestone.unlockedAt).toLocaleDateString('zh-HK')}</small>
          <div class="share" id="milestone-share-link">⤴ 生成靚卡 share 俾朋友</div>
        </div>
      </div>
    ` : ''}
  `;

  el.querySelectorAll('[data-qid]').forEach(card => {
    card.addEventListener('click', () => {
      const q = quests.find(x => x.id === card.dataset.qid);
      q.done = !q.done;
      Catnu.Store.save(state);
      if (quests.every(x => x.done)) {
        state.streak = Catnu.completeQuestsForDay(state.streak, today);
        const unlocked = Catnu.checkNewMilestones(state, Date.now());
        if (unlocked.length) state.milestones.push(...unlocked);
        Catnu.Store.save(state);
        Catnu.showToast('🔥 今日任務全部完成！Streak +1');
      }
      renderQuests(state);
      renderShellStreak(state);
    });
  });

  const shareLink = document.getElementById('milestone-share-link');
  if (shareLink) {
    shareLink.addEventListener('click', () => {
      if (typeof Catnu.shareMilestoneCard === 'function') Catnu.shareMilestoneCard(latestMilestone, state);
      else Catnu.showToast('Share 功能開發緊，下個 task 完成');
    });
  }
}

RENDERERS.quests = renderQuests;

let analysisCatId = null;

function insightIcon(insight) {
  const action = Catnu.ACTIONS.find(a => a.id === insight.actionId);
  if (action) return action.label.split(' ')[0];
  return insight.type === 'positive' ? '💡' : insight.type === 'negative' ? '⚠️' : '🪄';
}

function mdBold(text) { return text.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>'); }

function renderAnalysis(state) {
  const el = document.getElementById('tab-analysis');
  if (!state.cats.length) {
    el.innerHTML = '<div class="card" style="text-align:center;padding:30px 16px"><div style="font-size:36px;margin-bottom:10px">🐾</div><b>未有貓貓資料</b><p style="margin-top:8px;font-size:13px;color:var(--sub)">去「檔案」page 加返隻貓先可以睇分析。</p></div>';
    return;
  }
  if (!analysisCatId || !state.cats.some(c => c.id === analysisCatId)) analysisCatId = state.cats[0].id;
  const cat = state.cats.find(c => c.id === analysisCatId);
  const switcherHtml = `<div class="switcher">${state.cats.map(c => `<div class="chip ${c.id === analysisCatId ? 'sel' : ''}" data-cat="${c.id}">${c.emoji} ${c.name}</div>`).join('')}</div>`;
  const now = Date.now();
  const affection = Catnu.affectionScore(state.logs, cat.id, now);

  if (affection.insufficient) {
    el.innerHTML = `
      ${switcherHtml}
      <div class="card empty-state">
        <div class="big">🙀</div>
        <b>修行未夠，繼續記錄</b>
        <p style="margin-top:8px;font-size:13px">呢隻貓近 7 日仲未夠 5 條非中性記錄，去「記錄」page 記多幾次先會有分析結果。</p>
      </div>
    `;
    el.querySelectorAll('[data-cat]').forEach(c => c.addEventListener('click', () => { analysisCatId = c.dataset.cat; renderAnalysis(state); }));
    return;
  }

  const insights = Catnu.generateInsights(state.logs, cat, now);
  const dayBars = [];
  for (let i = 6; i >= 0; i--) {
    const dayStart = now - i * 86400000 - (now % 86400000);
    const dayEnd = dayStart + 86400000;
    let pos = 0, neg = 0;
    state.logs.filter(l => l.catId === cat.id && l.ts >= dayStart && l.ts < dayEnd).forEach(l => {
      const p = Catnu.entryPolarity(l);
      if (p === 'positive') pos++; else if (p === 'negative') neg++;
    });
    const total = pos + neg;
    dayBars.push({ pct: total > 0 ? Math.round((pos / total) * 100) : 0, hasData: total > 0 });
  }

  el.innerHTML = `
    ${switcherHtml}
    <div class="card">
      <div class="cat-row">
        <div class="avatar">${cat.emoji}</div>
        <div class="cat-meta"><div class="name">好感度指數</div><div class="breed">近 7 日正面反應加權比率</div></div>
        <div class="score">
          <div class="num">${affection.score}</div>
          <div class="lbl">${affection.weekChange == null ? '' : (affection.weekChange >= 0 ? `↑ +${affection.weekChange}` : `↓ ${affection.weekChange}`)}</div>
        </div>
      </div>
      <div class="meter"><div style="width:${affection.score}%"></div></div>
      <div class="minibars">${dayBars.map(b => `<div class="bar ${b.hasData ? (b.pct >= 50 ? 'pos' : 'neg') : ''}" style="height:${b.hasData ? Math.max(b.pct, 8) : 4}%"></div>`).join('')}</div>
    </div>
    <div class="card">
      <h3><span class="deco">◆</span> 溝貓建議</h3>
      ${insights.length ? insights.map(i => `<div class="insight"><span>${insightIcon(i)}</span><span>${mdBold(i.text)}</span></div>`).join('') : '<div class="note">暫時未有夠數據嘅發現，繼續記錄啦。</div>'}
    </div>
  `;
  el.querySelectorAll('[data-cat]').forEach(c => c.addEventListener('click', () => { analysisCatId = c.dataset.cat; renderAnalysis(state); }));
}

RENDERERS.analysis = renderAnalysis;
/* @APP:BOOT */
window.addEventListener('DOMContentLoaded', initApp);
})();
</script>
</body>
